name: CI/CD

on:
  push:
    branches:
      -main
    pull_request:
      branches:
        -main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: set up python
        uses: actions/setup-python@v4
        with:
         python-version: 3.9
      - name: install dependencies
        run: |
          pip install -r requirements.txt
          pytest
  docker:
    depends-on: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: run docker
        run:
          docker build -t palindrome-app .
          docker run -it palindrome-app

      